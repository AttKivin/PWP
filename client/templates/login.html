{% extends "base.html" %}
{% block title %}Sign in — HabitHub{% endblock %}

{% block content %}
<div class="auth-brand">
  <h1>HabitHub</h1>
  <p>Track your habits, build better routines</p>
</div>

<div class="auth-cards">
  <div class="auth-card">
    <h3>Sign in</h3>
    <p>Enter your email to continue.</p>
    <form method="post" action="{{ url_for('do_login') }}">
      <div class="auth-field">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="name@example.com" autofocus>
      </div>
      <button type="submit" class="auth-btn">Sign in &rarr;</button>
    </form>
  </div>

  <div class="auth-card">
    <h3>Create account</h3>
    <p>New here? Start tracking habits today.</p>
    <form method="post" action="{{ url_for('create_user') }}">
      <div class="auth-field">
        <label>First name</label>
        <input name="first_name" required>
      </div>
      <div class="auth-field">
        <label>Last name</label>
        <input name="last_name" required>
      </div>
      <div class="auth-field">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="name@example.com">
      </div>
      <button type="submit" class="auth-btn">Create account &rarr;</button>
    </form>
  </div>
</div>
{% endblock %}
