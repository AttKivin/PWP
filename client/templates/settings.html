{% extends "base.html" %}
{% block title %}Settings — HabitHub{% endblock %}

{% block content %}
<div class="page-hd">
  <h2>Settings</h2>
  <p>Manage your account</p>
</div>

<div class="card" style="max-width: 480px;">
  <div class="card-hd">Profile</div>
  {% if user %}
  <form method="post" action="{{ url_for('edit_user') }}">
    <div class="form-field" style="margin-bottom: 12px;">
      <label class="field-label">First name</label>
      <input name="first_name" value="{{ user.first_name }}" required>
    </div>
    <div class="form-field" style="margin-bottom: 12px;">
      <label class="field-label">Last name</label>
      <input name="last_name" value="{{ user.last_name }}" required>
    </div>
    <div class="form-field" style="margin-bottom: 18px;">
      <label class="field-label">Email</label>
      <input type="email" name="email" value="{{ user.email }}" required>
    </div>
    <button type="submit">Save profile</button>
  </form>
  {% else %}
  <p class="text-muted">Could not load profile.</p>
  {% endif %}
</div>

<div class="card" style="max-width: 480px; border-color: #fecaca;">
  <div class="card-hd" style="color: var(--danger);">Danger Zone</div>
  <p class="text-muted" style="margin-bottom: 14px; font-size: 0.875rem;">Permanently delete your account and all associated data.</p>
  <form method="post" action="{{ url_for('delete_user') }}" onsubmit="return confirm('Permanently delete your account? This cannot be undone.');">
    <button type="submit" class="btn-danger">Delete my account</button>
  </form>
</div>
{% endblock %}
