---
description: Replace tracking log data with new values
security:
  - apiKey: []
parameters:
  - $ref: '#/components/parameters/user'
  - $ref: '#/components/parameters/habit'
  - $ref: '#/components/parameters/tracking'
requestBody:
  description: JSON document containing updated tracking log data
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Tracking'
      example:
        log_time: "2026-03-02T08:00:00Z"
responses:
  '204':
    description: The tracking log was updated successfully
  '400':
    description: Request body failed JSON schema validation
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Request body failed JSON schema validation
          status: 400
  '401':
    description: Invalid or missing API key
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Invalid or missing API key
          status: 401
  '404':
    description: The tracking log was not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: The tracking log was not found
          status: 404
  '415':
    description: Request content type was not application/json
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Request content type was not application/json
          status: 415
