---
description: Delete a reminder
security:
  - apiKey: []
parameters:
  - $ref: '#/components/parameters/user'
  - $ref: '#/components/parameters/habit'
  - $ref: '#/components/parameters/reminder'
responses:
  '204':
    description: The reminder was deleted successfully
  '401':
    description: Invalid or missing API key
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Invalid or missing API key
          status: 401
  '404':
    description: The reminder was not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: The reminder was not found
          status: 404
