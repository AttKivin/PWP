---
description: Create a new habit for a user
security:
  - apiKey: []
requestBody:
  description: JSON document containing habit data
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/Habit'
      example:
        name: Water Drinking
        active: true
        creation_date: 2025-01-10
responses:
  '201':
    description: The habit was created successfully
    headers:
      Location:
        description: URI of the newly created habit
        schema:
          type: string
  '400':
    description: Request body failed JSON schema validation
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Request body failed JSON schema validation
          status: 400
  '401':
    description: Invalid or missing API key
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Invalid or missing API key
          status: 401
  '415':
    description: Request content type was not application/json
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Request content type was not application/json
          status: 415
