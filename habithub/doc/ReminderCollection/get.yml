---
description: Get all reminders for a habit
security:
  - apiKey: []
parameters:
  - $ref: '#/components/parameters/user'
  - $ref: '#/components/parameters/habit'
responses:
  '200':
    description: List of reminders for the habit
    content:
      application/json:
        example:
          - id: 1
            reminded_time: "09:00"
            creation_date: "2025-01-10T08:12:45Z"
            _links:
              self:
                href: /users/1/habits/1/reminders/1
              habit:
                href: /users/1/habits/1
          - id: 2
            reminded_time: "14:30"
            creation_date: "2025-01-10T08:12:45Z"
            _links:
              self:
                href: /users/1/habits/1/reminders/2
              habit:
                href: /users/1/habits/1
  '401':
    description: Invalid or missing API key
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Invalid or missing API key
          status: 401
  '404':
    description: The habit was not found
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: The habit was not found
          status: 404
