---
description: Create a new user
security:
- apiKey: []
requestBody:
  description: JSON document containing user data
  required: true
  content:
    application/json:
      schema:
        $ref: '#/components/schemas/User'
      example:
        first_name: Atte
        last_name: Kiviniemi
        email: atte.kiviniemi@example.com
responses:
  '201':
    description: The user was created successfully
    headers:
      Location:
        description: URI of the newly created user
        schema:
          type: string
  '400':
    description: Request body failed JSON schema validation
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Request body failed JSON schema validation
          status: 400
  '401':
    description: Invalid or missing API key
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Invalid or missing API key
          status: 401
  '409':
    description: A user with the given email already exists
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: A user with the given email already exists
          status: 409
  '415':
    description: Request content type was not application/json
    content:
      application/json:
        schema:
          $ref: '#/components/schemas/Error'
        example:
          message: Request content type was not application/json
          status: 415
